services:
  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - net

  mongo1:
    image: mongo:8.3.1
    container_name: ${MONGO1_HOST}
    hostname: ${MONGO1_HOST}
    restart: unless-stopped
    command: [ "mongod", "--replSet", "${RS_NAME}", "--bind_ip_all", "--port", "${MONGO_PORT}" ]
    volumes:
      - ./data/mongo-1:/data/db
    ports:
      - "${MONGO1_HOST_PORT}:${MONGO_PORT}"
    networks:
      - net

  mongo2:
    image: mongo:8.3.1
    container_name: ${MONGO2_HOST}
    hostname: ${MONGO2_HOST}
    restart: unless-stopped
    command: [ "mongod", "--replSet", "${RS_NAME}", "--bind_ip_all", "--port", "${MONGO_PORT}" ]
    volumes:
      - ./data/mongo-2:/data/db
    ports:
      - "${MONGO2_HOST_PORT}:${MONGO_PORT}"
    networks:
      - net

  mongo3:
    image: mongo:8.3.1
    container_name: ${MONGO3_HOST}
    hostname: ${MONGO3_HOST}
    restart: unless-stopped
    command: [ "mongod", "--replSet", "${RS_NAME}", "--bind_ip_all", "--port", "${MONGO_PORT}" ]
    volumes:
      - ./data/mongo-3:/data/db
    ports:
      - "${MONGO3_HOST_PORT}:${MONGO_PORT}"
    networks:
      - net

  mongo-init:
    image: mongo:8.3.1
    container_name: mongo-init
    restart: "no"
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    environment:
      RS_NAME: ${RS_NAME}
      MONGO1_HOST: ${MONGO1_HOST}
      MONGO2_HOST: ${MONGO2_HOST}
      MONGO3_HOST: ${MONGO3_HOST}
      MONGO_PORT: ${MONGO_PORT}
    entrypoint:
      - bash
      - -lc
      - |
        set -e

        echo "Waiting for Mongo nodes..."
        for host in "$$MONGO1_HOST" "$$MONGO2_HOST" "$$MONGO3_HOST"; do
          until mongosh --host "$$host" --port "$$MONGO_PORT" --eval "db.runCommand({ping:1})" >/dev/null 2>&1; do
            sleep 2
          done
        done

        echo "Configuring replica set..."
        mongosh --host "$$MONGO1_HOST" --port "$$MONGO_PORT" --eval "
          const desired = {
            _id: '$$RS_NAME',
            members: [
              { _id: 0, host: '$$MONGO1_HOST:$$MONGO_PORT' },
              { _id: 1, host: '$$MONGO2_HOST:$$MONGO_PORT' },
              { _id: 2, host: '$$MONGO3_HOST:$$MONGO_PORT' }
            ]
          };
          let status;
          try { status = rs.status(); } catch (e) { status = null; }
          if (!status || status.codeName === 'NotYetInitialized') {
            print('Initiating replica set...');
            rs.initiate(desired);
          } else {
            const current = rs.conf().members.map(m => m.host).sort().join(',');
            const want    = desired.members.map(m => m.host).sort().join(',');
            if (current !== want) {
              print('Reconfiguring replica set members...');
              const cfg = rs.conf();
              cfg.members = desired.members;
              rs.reconfig(cfg, { force: true });
            } else {
              print('Replica set already configured correctly');
            }
          }
        "

        echo "Waiting for primary election..."
        until mongosh "mongodb://$$MONGO1_HOST:$$MONGO_PORT,$$MONGO2_HOST:$$MONGO_PORT,$$MONGO3_HOST:$$MONGO_PORT/?replicaSet=$$RS_NAME" \
          --eval "db.adminCommand({ping:1})" >/dev/null 2>&1; do
          sleep 2
        done

        echo "Replica set ready"
    networks:
      - net

  liquibase-mongo:
    build:
      context: ./db
      dockerfile: Dockerfile-liquibase
    container_name: liquibase-mongo
    restart: "no"
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    command:
      - --search-path=/liquibase/changelog
      - --changelog-file=master.yaml
      - --url=mongodb://${MONGO1_HOST}:${MONGO_PORT},${MONGO2_HOST}:${MONGO_PORT},${MONGO3_HOST}:${MONGO_PORT}/${MONGO_DB_NAME}?replicaSet=${RS_NAME}
      - --log-level=info
      - update
    networks:
      - net

  app:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: app
    restart: on-failure:5
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:${APP_PORT}/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      liquibase-mongo:
        condition: service_completed_successfully
      redis:
        condition: service_started
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      - APP_PORT=${APP_PORT}
      - MONGO1_HOST=${MONGO1_HOST}
      - MONGO2_HOST=${MONGO2_HOST}
      - MONGO3_HOST=${MONGO3_HOST}
      - MONGO_PORT=${MONGO_PORT}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - RS_NAME=${RS_NAME}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - net

networks:
  net:
    driver: bridge