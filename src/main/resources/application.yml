server:
  port: ${APP_PORT}

spring:
  mongodb:
    host: ${MONGO1_HOST},${MONGO2_HOST},${MONGO3_HOST}
    port: ${MONGO_PORT}
    replica-set-name: ${RS_NAME}
    database: ${MONGO_DB_NAME}
  data:
    mongodb:
      auto-index-creation: false   # Indexes are managed by Liquibase changesets

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  codec:
    max-in-memory-size: 5MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret-key: ${JWT_SECRET_KEY}
  token:
    prefix: "Bearer "
  access-token:
    expiration-time-ms: 300000
  refresh-token:
    expiration-time-ms: 28800000
    access-token-key: AccessTokenKey

springdoc:
  api-docs:
    groups:
      enabled: true
  packages-to-scan: com.rzodeczko
  swagger-ui:
    path: /docs
    config-url: /v3/api-docs/swagger-config
    url: /v3/api-docs

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin1234}

management:
  endpoints:
    web:
      exposure:
        include: health

# Rate limiter for public auth endpoints (/login, /register).
# Each unique client IP is allowed `capacity` requests per `refill-period-seconds`.
# Exceeding the limit returns HTTP 429 with a Retry-After header.
rate-limit:
  capacity: 10
  refill-tokens: 10
  refill-period-seconds: 60