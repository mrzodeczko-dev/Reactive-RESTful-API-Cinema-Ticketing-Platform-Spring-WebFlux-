name: ci pipeline
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      # Budujemy bez testów tylko po to, żeby sprawdzić czy projekt się kompiluje
      # i żeby wypełnić cache M2 — resztę robią joby testowe samodzielnie
      - name: Build package without tests
        run: mvn clean package --batch-mode --no-transfer-progress -Dmaven.test.skip=true

  test:
    runs-on: ubuntu-latest
    needs: [ build ]
    strategy:
      fail-fast: true
      matrix:
        suite:
          - name: unit
            cmd: mvn test-compile surefire:test
            profile: ""
            exec: jacoco-unit.exec
          - name: it-handlers
            cmd: mvn verify -DskipUTs=true
            profile: -P it-handlers
            exec: jacoco-it-handlers.exec
          - name: it-testcontainers
            cmd: mvn verify -DskipUTs=true
            profile: -P it-testcontainers
            exec: jacoco-it-testcontainers.exec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run ${{ matrix.suite.name }} tests
        run: >
          ${{ matrix.suite.cmd }}
          ${{ matrix.suite.profile }}
          --batch-mode
          --no-transfer-progress
          -Djacoco.dataFile=target/${{ matrix.suite.exec }}

      - uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.suite.name }}
          path: target/${{ matrix.suite.exec }}
          retention-days: 1

  coverage:
    runs-on: ubuntu-latest
    needs: [ test ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Compile production classes
        run: mvn compile --batch-mode --no-transfer-progress
      - uses: actions/download-artifact@v4
        with:
          name: jacoco-unit
          path: target/
      - uses: actions/download-artifact@v4
        with:
          name: jacoco-it-handlers
          path: target/
      - uses: actions/download-artifact@v4
        with:
          name: jacoco-it-testcontainers
          path: target/
      - name: Merge JaCoCo exec files
        run: mvn jacoco:merge --batch-mode --no-transfer-progress -Djacoco.destFile=target/jacoco.exec
      - name: Generate JaCoCo report
        run: mvn jacoco:report --batch-mode --no-transfer-progress -Djacoco.dataFile=target/jacoco.exec
      - name: Check if jacoco.xml exists
        run: ls -la target/site/jacoco/ || echo "Report directory does not exist"
      - name: Check coverage
        run: mvn jacoco:check --batch-mode --no-transfer-progress -Djacoco.dataFile=target/jacoco.exec
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

