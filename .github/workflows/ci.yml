name: ci pipeline
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build package without tests
        run: mvn clean package --batch-mode --no-transfer-progress -Dmaven.test.skip=true
      - name: Upload compiled classes
        uses: actions/upload-artifact@v4
        with:
          name: compiled-classes
          path: target/
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: [ build ]
    strategy:
      fail-fast: true
      matrix:
        suite:
          - name: unit
            cmd: mvn surefire:test
            profile: ""
            exec: jacoco-unit.exec
          - name: it-handlers
            cmd: mvn failsafe:integration-test failsafe:verify
            profile: -P it-handlers
            exec: jacoco-it-handlers.exec
          - name: it-testcontainers
            cmd: mvn failsafe:integration-test failsafe:verify
            profile: -P it-testcontainers
            exec: jacoco-it-testcontainers.exec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Pobieramy skompilowane klasy z joba build — bez tego Maven
      # musiałby kompilować od nowa i mógłby nie znaleźć zasobów.
      - name: Download compiled classes
        uses: actions/download-artifact@v4
        with:
          name: compiled-classes
          path: target/

      - name: Run ${{ matrix.suite.name }} tests
        run: >
          ${{ matrix.suite.cmd }}
          ${{ matrix.suite.profile }}
          --batch-mode
          --no-transfer-progress
          -Dmaven.main.skip=true
          -Djacoco.dataFile=target/${{ matrix.suite.exec }}

      - uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.suite.name }}
          path: target/${{ matrix.suite.exec }}
          retention-days: 1

  coverage:
    runs-on: ubuntu-latest
    needs: [ test ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Download compiled classes
        uses: actions/download-artifact@v4
        with:
          name: compiled-classes
          path: target/
      - uses: actions/download-artifact@v4
        with:
          name: jacoco-unit
          path: target/
      - uses: actions/download-artifact@v4
        with:
          name: jacoco-it-handlers
          path: target/
      - uses: actions/download-artifact@v4
        with:
          name: jacoco-it-testcontainers
          path: target/
      - name: Merge JaCoCo exec files
        run: mvn jacoco:merge --batch-mode --no-transfer-progress -Djacoco.destFile=target/jacoco.exec
      - name: Generate JaCoCo report
        run: mvn jacoco:report --batch-mode --no-transfer-progress -Djacoco.dataFile=target/jacoco.exec
      - name: Check coverage
        run: mvn jacoco:check --batch-mode --no-transfer-progress -Djacoco.dataFile=target/jacoco.exec
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}