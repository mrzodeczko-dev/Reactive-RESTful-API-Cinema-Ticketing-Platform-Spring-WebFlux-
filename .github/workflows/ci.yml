name: ci pipeline

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
  workflow_call:

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build (package)
        run: mvn clean package --batch-mode --no-transfer-progress -Dmaven.test.skip=true
      - uses: actions/upload-artifact@v4
        with:
          name: package
          path: target

  unit-test:
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - uses: actions/download-artifact@v4
        with:
          name: package
          path: target
      - name: Run unit tests
        run: >
          mvn test
          --batch-mode
          --no-transfer-progress
      - uses: actions/upload-artifact@v4
        with:
          name: jacoco-unit
          path: target/jacoco-unit.exec


  integration-handlers-test:
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - uses: actions/download-artifact@v4
        with:
          name: package
          path: target
      - name: Run it handlers tests
        run: >
          mvn failsafe:integration-test failsafe:verify
          -P it-handlers
          --batch-mode
          --no-transfer-progress
      - uses: actions/upload-artifact@v4
        with:
          name: jacoco-it-handlers
          path: target/jacoco-it-handlers.exec


  integration-testcontainers:
    runs-on: ubuntu-latest
    needs: [ build ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - uses: actions/download-artifact@v4
        with:
          name: package
          path: target
      - name: Run it testcontainers
        run: >
          mvn failsafe:integration-test failsafe:verify
          -P it-testcontainers
          --batch-mode
          --no-transfer-progress
      - uses: actions/upload-artifact@v4
        with:
          name: jacoco-it-testcontainers
          path: target/jacoco-it-testcontainers.exec


  coverage:
    runs-on: ubuntu-latest
    needs: [ unit-test, integration-handlers-test, integration-testcontainers ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - uses: actions/download-artifact@v4
        with:
          name: jacoco-unit
          path: target/
      - uses: actions/download-artifact@v4
        with:
          name: jacoco-it-handlers
          path: target/
      - uses: actions/download-artifact@v4
        with:
          name: jacoco-it-testcontainers
          path: target/
      - name: Merge and report coverage
        run: mvn jacoco:merge jacoco:report jacoco:check


      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Check coverage
        run: mvn jacoco:check

